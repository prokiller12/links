<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Página minimalista e responsiva com foco no Instagram, pronta para GitHub Pages." />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Miguel Parente</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=boska@500,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <a class="skip-link" href="#content">Saltar para o conteúdo</a>

  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <main id="content" class="hero-shell">
    <section class="profile-card" aria-label="Perfil principal">
      <div class="card-glow" aria-hidden="true"></div>

      <header class="profile-header">
        <div class="avatar-wrap" aria-hidden="true">
          <div class="avatar-ring"></div>
          <div class="avatar">
            <svg viewBox="0 0 160 160" fill="none">
              <rect width="160" height="160" rx="42" fill="#121212"></rect>
              <circle cx="80" cy="62" r="26" fill="#f3eee4"></circle>
              <path d="M38 126C47.8 98.4 64.9 84.6 80 84.6C95.1 84.6 112.2 98.4 122 126" stroke="#f3eee4" stroke-width="17" stroke-linecap="round"></path>
            </svg>
          </div>
        </div>

        <div class="heading-block">
          <p class="eyebrow">Instagram</p>
          <h1>Miguel Parente</h1>
          <p class="username">@mileummisterio</p>
        </div>
      </header>

      <nav class="links" aria-label="Links do perfil">
        <a class="primary-link" href="https://www.instagram.com/mileummisterio/" target="_blank" rel="noopener noreferrer" aria-label="Abrir Instagram">
          <span class="link-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M17.5 6.5h.01"></path>
            </svg>
          </span>
          <span class="link-copy">
            <strong>Abrir Instagram</strong>
            <small>https://www.instagram.com/mileummisterio/</small>
          </span>
          <span class="link-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
              <path d="M7 17 17 7"></path>
              <path d="M9 7h8v8"></path>
            </svg>
          </span>
        </a>

        <button class="secondary-link" type="button" data-copy="@mileummisterio">
          <span>Copiar</span>
        </button>

        <p class="feedback" aria-live="polite"></p>
      </nav>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
